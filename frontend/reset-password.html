<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Set New Password - 3rd AI</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { margin-bottom: 30px; font-weight: 300; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(0,242,254,0.2); }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79,172,254,0.4); }
    </style>
</head>
<body>
    <div class="container">
        <h2>New Password</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 25px;">Enter your new secure password</p>
        <div id="errorBanner" class="error" style="display:none;"></div>
        <form id="resetPasswordForm">
            <div class="input-group">
                <label>New Password</label>
                <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required>
            </div>
            <button type="submit">Update Password</button>
        </form>
    </div>

    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const params = new URLSearchParams(window.location.search);
            const email = params.get('email');
            const newPassword = document.getElementById('newPassword').value;
            
            if (!email) {
                alert("Email not found in URL. Please start from Forgot Password page.");
                return;
            }
            
            try {
                const response = await fetch('https://cyber-guardian-platform.onrender.com/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ email, newPassword })
                });
                const data = await response.json();
                
                const errBanner = document.getElementById('errorBanner');
                if (data.success) {
                    errBanner.style.display = 'block';
                    errBanner.style.color = '#10b981';
                    errBanner.innerText = 'Password Reset Successful! Redirecting to login...';
                    setTimeout(() => window.location.href = 'login.html', 1500);
                } else {
                    errBanner.style.display = 'block';
                    errBanner.style.color = '#ff4b2b';
                    errBanner.innerText = data.message || 'Reset failed.';
                }
            } catch (err) {
                const errBanner = document.getElementById('errorBanner');
                errBanner.style.display = 'block';
                errBanner.style.color = '#ff4b2b';
                errBanner.innerText = 'Server error. Ensure backend is running.';
            }
        });
    </script>
</body>
</html>
