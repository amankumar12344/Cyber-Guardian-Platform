# Spring Boot Multi-Profile Database Configuration
# Defaults to local SQLite. Set SPRING_PROFILES_ACTIVE=mysql to activate cloud MySQL.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:sqlite}

# Server Port (Dynamic for Cloud)
server.port=${PORT:8085}

# Email Configuration (Environment Variables)
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME}
spring.mail.password=${MAIL_PASSWORD}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Disable Thymeleaf cache for instant UI updates during development
spring.thymeleaf.cache=false
