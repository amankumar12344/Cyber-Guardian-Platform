<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Forgot Password - Cyber Guardian</title>
    <style>
        :root {
            --primary: #00f2fe;
            --secondary: #4facfe;
            --bg: #0a0b10;
            --glass: rgba(255, 255, 255, 0.05);
        }
        body {
            background: var(--bg);
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }
        .container {
            background: var(--glass);
            backdrop-filter: blur(20px);
            padding: 40px;
            border-radius: 24px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            width: 350px;
            box-shadow: 0 25px 50px rgba(0,0,0,0.5);
            text-align: center;
        }
        h2 { margin-bottom: 30px; font-weight: 300; letter-spacing: 1px; }
        .input-group { margin-bottom: 20px; text-align: left; }
        label { display: block; margin-bottom: 8px; font-size: 0.9rem; color: #888; }
        input {
            width: 100%;
            padding: 12px;
            background: rgba(0,0,0,0.3);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }
        input:focus { border-color: var(--primary); outline: none; box-shadow: 0 0 15px rgba(0,242,254,0.2); }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, var(--secondary), var(--primary));
            border: none;
            border-radius: 12px;
            color: white;
            font-weight: bold;
            cursor: pointer;
            margin-top: 10px;
            transition: 0.3s;
        }
        button:hover { transform: translateY(-2px); box-shadow: 0 10px 20px rgba(79,172,254,0.4); }
        .error { color: #ff4b2b; font-size: 0.85rem; margin-top: 15px; }
        .back-link { margin-top: 20px; display: block; color: #888; text-decoration: none; font-size: 0.9rem; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Reset Password</h2>
        <p style="color: #888; font-size: 0.9rem; margin-bottom: 25px;">Enter your details to verify your account</p>
        <form th:action="@{/forgot-password}" method="post">
            <div class="input-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="name@example.com" required>
            </div>
            <div class="input-group">
                <label>Phone Number</label>
                <input type="text" name="phone" placeholder="Enter registered phone" required>
            </div>
            <button type="submit">Verify Account</button>
            <div th:if="${error}" class="error" th:text="${error}"></div>
        </form>
        <a href="/login" class="back-link">Back to Login</a>
    </div>
</body>
</html>
