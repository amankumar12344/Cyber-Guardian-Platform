<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>3RD AI KAVACH | SECURE LOGIN</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #00f2fe;
            --accent: #4facfe;
            --bg-dark: #050608;
            --glass-bg: rgba(10, 12, 16, 0.7);
            --border-color: rgba(0, 242, 254, 0.2);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Outfit', sans-serif;
            background: #000;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: white;
            background-image: url('/images/kavach_bg.png');
            background-size: cover;
            background-position: center;
            position: relative;
        }

        /* Overlay to ensure readability */
        body::after {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at center, transparent 0%, rgba(0,0,0,0.6) 100%);
            z-index: 2;
        }

        .login-card {
            width: 420px;
            padding: 50px 40px;
            background: rgba(5, 6, 8, 0.85);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(0, 242, 254, 0.3);
            border-radius: 20px;
            box-shadow: 0 0 40px rgba(0, 242, 254, 0.2);
            position: relative;
            z-index: 10;
            text-align: center;
            border-top: 4px solid var(--primary);
        }

        .logo-text {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 4px;
            color: white;
            margin-bottom: 5px;
        }

        .logo-sub {
            font-size: 11px;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 5px;
            margin-bottom: 40px;
            font-weight: 600;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            font-size: 12px;
            color: #94a3b8;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .input-group input {
            width: 100%;
            background: rgba(0,0,0,0.3);
            border: 1px solid var(--border-color);
            padding: 12px 15px;
            border-radius: 12px;
            color: white;
            outline: none;
            transition: all 0.3s ease;
            font-size: 15px;
        }

        .input-group input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(0, 242, 254, 0.2);
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            color: #050608;
            font-weight: 700;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
            filter: brightness(1.1);
        }

        .error-msg {
            background: rgba(239, 68, 68, 0.1);
            color: #fca5a5;
            padding: 12px;
            border-radius: 10px;
            font-size: 13px;
            border: 1px solid rgba(239, 68, 68, 0.2);
            margin-bottom: 20px;
            text-align: center;
        }

        .footer-links {
            margin-top: 30px;
            text-align: center;
            font-size: 14px;
            color: #64748b;
        }

        .footer-links a {
            color: var(--primary);
            text-decoration: none;
            font-weight: 600;
            transition: color 0.3s;
        }

        .footer-links a:hover {
            color: white;
        }

        .glow-dot {
            position: absolute;
            width: 150px;
            height: 150px;
            background: var(--primary);
            filter: blur(80px);
            opacity: 0.2;
            border-radius: 50%;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="glow-dot" style="top: -50px; left: -50px;"></div>
    <div class="glow-dot" style="bottom: -50px; right: -50px; background: var(--accent);"></div>

    <div class="login-card">
        <div class="logo-container">
            <div class="logo-text" style="color: #0066ff;">🛡️ 3RD AI POLICE HQ</div>
            <div class="logo-sub" style="color: #0066ff;">OFFICER LOGIN PORTAL</div>
        </div>

        <!-- Alerts -->
        <div th:if="${param.success}" style="background: rgba(34, 197, 94, 0.1); border: 1px solid #4ade80; color: #4ade80; padding: 12px; border-radius: 10px; margin-bottom: 20px; font-size: 13px; text-align: center;">
            Registration Successful! Please login.
        </div>
        <div th:if="${error}" class="error-msg" th:text="${error}"></div>

        <form th:action="@{/police/login}" method="post">
            <div class="input-group">
                <label>Officer ID (Email)</label>
                <input type="text" name="identifier" placeholder="officer@3rdai.gov" required>
            </div>
            <div class="input-group">
                <label>Access Password</label>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn" style="background: #0066ff; color: white;">Access Headquarters</button>
        </form>

        <div class="footer-links">
            <p style="margin-top: 10px;">New Officer? <a href="/police/signup" style="color: #0066ff;">Register Here</a></p>
        </div>
    </div>
</body>
</html>
