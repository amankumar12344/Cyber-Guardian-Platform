<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>3RD AI POLICE HQ | Officer New Credentials</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700;800;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Outfit', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        bgDark: '#010307',
                        cardBg: '#050c18',
                        policeBlue: '#0066ff',
                        accentBlue: '#0052cc',
                    }
                }
            }
        }
    </script>
    <style type="text/css">
        .grid-overlay {
            background-image: 
                linear-gradient(rgba(0, 102, 255, 0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 102, 255, 0.02) 1px, transparent 1px);
            background-size: 35px 35px;
        }
        @keyframes floatLogo {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-4px) scale(1.02); }
        }
        .logo-shield-anim {
            animation: floatLogo 3s ease-in-out infinite;
        }
    </style>
</head>
<body class="bg-bgDark text-white font-sans overflow-x-hidden min-h-screen relative flex items-center justify-center py-8 px-4 sm:px-6">

    <!-- Grid Background -->
    <div class="absolute inset-0 grid-overlay pointer-events-none z-0"></div>
    <div class="absolute top-0 left-0 w-full h-full bg-gradient-to-r from-blue-900/5 via-transparent to-policeBlue/5 pointer-events-none z-0"></div>
    <div class="hidden sm:block absolute top-1/4 left-1/4 w-[450px] h-[450px] bg-policeBlue/5 blur-[120px] rounded-full pointer-events-none z-0"></div>
    <div class="hidden sm:block absolute bottom-1/4 right-1/4 w-[400px] h-[400px] bg-indigo-500/5 blur-[120px] rounded-full pointer-events-none z-0"></div>

    <div class="w-full max-w-md flex flex-col items-center relative z-10">
        <!-- Back to Home -->
        <a href="/" class="self-start mb-6 text-xs font-bold text-gray-500 hover:text-white transition flex items-center gap-1.5">
            <span>←</span> Back to Home
        </a>
        
        <!-- Shield Logo -->
        <div class="relative w-20 h-20 sm:w-24 sm:h-24 mb-4 flex items-center justify-center">
            <div class="absolute inset-0 rounded-full border border-dashed border-policeBlue/20 animate-spin" style="animation-duration: 20s;"></div>
            <div class="absolute w-[60%] h-[60%] rounded-full border-2 border-policeBlue/30 shadow-[0_0_20px_rgba(0,102,255,0.2)]"></div>
            <span class="text-3xl sm:text-4xl z-10 filter drop-shadow-[0_0_8px_#0066ff] logo-shield-anim">🛡️</span>
        </div>

        <div class="text-center mb-6">
            <h1 class="text-2xl sm:text-3xl font-extrabold tracking-wider bg-gradient-to-r from-white via-white to-policeBlue bg-clip-text text-transparent">
                NEW PASSWORD
            </h1>
            <p class="text-[10px] sm:text-xs text-gray-400 mt-2 tracking-wide font-semibold">
                Set a secure password for your Officer Credentials
            </p>
        </div>

        <!-- Glassmorphic Form Card -->
        <div class="w-full rounded-[24px] sm:rounded-[30px] border border-policeBlue/20 bg-[#050c18]/85 backdrop-blur-2xl p-5 sm:p-8 md:p-10 shadow-2xl relative">
            
            <!-- Error/Success Banner -->
            <div id="errorBanner" style="display:none;" class="p-3 mb-5 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-semibold text-center"></div>

            <form id="resetPasswordForm" class="space-y-5">
                <input type="hidden" id="email" name="email" th:value="${param.email != null ? param.email : ''}">
                <div class="flex flex-col">
                    <label class="text-[10px] font-bold text-gray-300 uppercase tracking-widest mb-2">New Access Password</label>
                    <div class="relative flex items-center">
                        <span class="absolute left-4 text-gray-500 pointer-events-none text-sm">🔒</span>
                        <input type="password" id="newPassword" name="newPassword" placeholder="••••••••" required
                               class="w-full px-5 py-3.5 pl-11 rounded-2xl bg-black/40 border border-policeBlue/20 focus:outline-none focus:border-policeBlue/45 focus:bg-black/60 transition text-sm text-white font-medium">
                    </div>
                </div>

                <button type="submit" class="w-full py-4 rounded-2xl bg-gradient-to-r from-policeBlue to-indigo-600 text-white font-black shadow-[0_0_20px_rgba(0,102,255,0.3)] hover:scale-[1.01] active:scale-[0.99] transition uppercase tracking-wider text-xs flex items-center justify-center gap-2">
                    🛡️ Commit New Password
                </button>
            </form>

            <div class="mt-6 text-center text-xs text-gray-500 font-semibold">
                Return to <a href="/police/login" class="text-policeBlue hover:underline font-bold">HQ Login</a>
            </div>
        </div>

        <div class="mt-8 text-center text-xs text-gray-600 font-semibold tracking-wide">
            © 2025 3RD AI KAVACH. All rights reserved.
        </div>
    </div>

    <script>
        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            let email = document.getElementById('email').value;
            if (!email) {
                const params = new URLSearchParams(window.location.search);
                email = params.get('email');
            }
            
            const newPassword = document.getElementById('newPassword').value;
            
            if (!email) {
                const errBanner = document.getElementById('errorBanner');
                errBanner.style.display = 'block';
                errBanner.className = 'p-3 mb-5 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-semibold text-center';
                errBanner.innerText = '⚠️ Verification expired. Please restart recovery process.';
                return;
            }
            
            try {
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: new URLSearchParams({ email, newPassword })
                });
                const data = await response.json();
                
                const errBanner = document.getElementById('errorBanner');
                if (data.success) {
                    errBanner.style.display = 'block';
                    errBanner.className = 'p-3 mb-5 rounded-xl bg-green-500/10 border border-green-500/20 text-green-400 text-sm font-semibold text-center';
                    errBanner.innerText = '✅ Credentials Updated! Redirecting to headquarters...';
                    setTimeout(() => window.location.href = '/police/login?resetSuccess=true', 1500);
                } else {
                    errBanner.style.display = 'block';
                    errBanner.className = 'p-3 mb-5 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-semibold text-center';
                    errBanner.innerText = data.message || 'Credentials update failed.';
                }
            } catch (err) {
                const errBanner = document.getElementById('errorBanner');
                errBanner.style.display = 'block';
                errBanner.className = 'p-3 mb-5 rounded-xl bg-red-500/10 border border-red-500/20 text-red-400 text-sm font-semibold text-center';
                errBanner.innerText = 'HQ link error. Ensure server is online.';
            }
        });
    </script>
</body>
</html>
