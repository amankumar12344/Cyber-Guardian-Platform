<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Guardian | Welcome</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            background: #0a0b10;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        .welcome-card {
            text-align: center;
            padding: 50px;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            max-width: 500px;
            width: 90%;
        }
        .icon {
            font-size: 80px;
            margin-bottom: 20px;
            display: inline-block;
            filter: drop-shadow(0 0 10px var(--primary));
        }
        h1 {
            color: white;
            font-size: 32px;
            margin-bottom: 10px;
            letter-spacing: 2px;
        }
        p {
            color: #888;
            line-height: 1.6;
            margin-bottom: 40px;
        }
        .get-started-btn {
            background: linear-gradient(135deg, #00f2fe 0%, #4facfe 100%);
            color: #000;
            padding: 15px 40px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: bold;
            font-size: 18px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            display: inline-block;
        }
        .get-started-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(0, 242, 254, 0.3);
        }
    </style>
</head>
<body>
    <div class="welcome-card">
        <div class="icon">🛡️</div>
        <h1>CYBER GUARDIAN</h1>
        <p>Protect your system from unauthorized access with real-time monitoring and remote security controls.</p>
        <a href="/signup" class="get-started-btn">Get Started & Setup Account</a>
    </div>
</body>
</html>
